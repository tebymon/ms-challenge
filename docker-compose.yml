services:

  # ──────────────────────────────────────────────
  # PostgreSQL — base de datos principal
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ms-challenge-postgres
    environment:
      POSTGRES_DB:       tenpo
      POSTGRES_USER:     tenpo
      POSTGRES_PASSWORD: tenpo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenpo -d tenpo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ──────────────────────────────────────────────
  # Mock del servicio externo de porcentaje
  # Retorna siempre { "percentage": 10.0 }
  # ──────────────────────────────────────────────
  percentageMock:
    image: wiremock/wiremock:3.6.0
    container_name: ms-challenge-percentageMock
    ports:
      - "9090:8080"
    volumes:
      - ./wiremock:/home/wiremock
    command: --root-dir /home/wiremock
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/__admin/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────
  # ms-challenge API
  # ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ms-challenge-api
    ports:
      - "8080:8080"
    environment:
      DB_HOST:                 postgres
      DB_PORT:                 5432
      DB_NAME:                 tenpo
      DB_USER:                 tenpo
      DB_PASSWORD:             tenpo
      PERCENTAGE_SERVICE_URL:  http://percentageMock:8080
    depends_on:
      postgres:
        condition: service_healthy
      percentageMock:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
